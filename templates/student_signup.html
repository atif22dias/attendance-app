<!DOCTYPE html>
<html>
<head>
    <title>Student Signup</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }

        a {
            display: block;
            margin-top: 10px;
            color: #007BFF;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Student Signup</h2>

    <form method="POST">

        <input name="username" placeholder="Username" required>
        <input name="password" type="password" required>

        <button type="submit">Create Account</button>

    </form>

    <a href="/student-login">Already have account? Login</a>

</div>

</body>
</html>
