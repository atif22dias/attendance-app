<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance System</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .cards {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .card {
            width: 220px;
            padding: 25px;
            border-radius: 16px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: white;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.25);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
        }

        .desc {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 8px;
        }

        @media (max-width: 600px) {
            .cards {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Smart Attendance System</h1>
    <p>AI-powered attendance tracking with GPS validation</p>

    <div class="cards">

        <a href="/teacher" class="card">
            <div class="icon">👨‍🏫</div>
            <div class="title">Teacher</div>
            <div class="desc">Generate codes & view attendance</div>
        </a>

        <a href="/student" class="card">
            <div class="icon">🎓</div>
            <div class="title">Student</div>
            <div class="desc">Mark attendance with code</div>
        </a>

    </div>

</div>

</body>
</html>
