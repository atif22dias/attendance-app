<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 380px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: bold;
            color: #444;
        }

        .field input,
        .field select {

            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 15px;
        }

        button {

            width: 100%;
            padding: 12px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #218838;
        }

        .code-box {

            margin-top: 25px;
            background: #f8f9fa;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            display: none;
        }

        #code {

            font-size: 42px;
            color: #007BFF;
            margin: 0;
            letter-spacing: 3px;
        }

        #timer {

            margin-top: 10px;
            color: #666;
            font-size: 15px;
        }

        .link {

            display: block;
            margin-top: 18px;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .dashboard {
            background: #007BFF;
            color: white;
        }

        .dashboard:hover {
            background: #0069d9;
        }

        .logout {
            color: red;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>Teacher Panel</h2>

    <div class="field">

        <label>Custom Code (optional)</label>

        <input type="text"
               id="customCode"
               placeholder="Leave empty for random code">

    </div>

    <div class="field">

        <label>Code Expiry</label>

        <select id="expiry">

            <option value="30">30 Seconds</option>
            <option value="60" selected>1 Minute</option>
            <option value="300">5 Minutes</option>
            <option value="600">10 Minutes</option>

        </select>

    </div>

    <button onclick="generate()">
        Generate Attendance Code
    </button>

    <div class="code-box" id="codeBox">

        <h1 id="code"></h1>

        <div id="timer"></div>

    </div>

    <a href="/dashboard" class="link dashboard">
        View Dashboard
    </a>

    <a href="/logout" class="link logout">
        Logout
    </a>

</div>

<script>

let countdown;

function generate() {

    let expiry = document.getElementById("expiry").value;

    let customCode =
        document.getElementById("customCode").value;

    navigator.geolocation.getCurrentPosition(function(position) {

        fetch(`/generate?lat=${position.coords.latitude}&lng=${position.coords.longitude}&expiry=${expiry}&custom=${customCode}`)

        .then(res => res.json())

        .then(data => {

            document.getElementById("codeBox").style.display = "block";

            document.getElementById("code").innerText = data.code;

            startTimer(data.expires_in);

        })

        .catch(err => {

            console.log(err);

            alert("Error generating code");

        });

    });

}

function startTimer(seconds) {

    clearInterval(countdown);

    let timer = seconds;

    countdown = setInterval(() => {

        let mins = Math.floor(timer / 60);

        let secs = timer % 60;

        document.getElementById("timer").innerText =
            `Expires in ${mins}:${secs.toString().padStart(2, '0')}`;

        timer--;

        if (timer < 0) {

            clearInterval(countdown);

            document.getElementById("timer").innerText =
                "Code expired";

        }

    }, 1000);

}

</script>

</body>
</html>
