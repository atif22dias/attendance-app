<!DOCTYPE html>
<html>
<head>
    <title>Attendance Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #007BFF;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .container {
            margin-top: 40px;
        }

        .btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 10px;
            text-align: center;
            background: #28a745;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<h2>Attendance Dashboard</h2>

<a class="btn" href="/teacher">Back to Teacher Panel</a>

<div class="container">

{% if records|length == 0 %}
    <h3 style="text-align:center;">No attendance records yet</h3>
{% else %}

<table border="1" cellpadding="10" style="margin:auto;">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Code</th>
        <th>Latitude</th>
        <th>Longitude</th>
        <th>Time</th>
        <th>Location</th>
    </tr>

    {% for r in records %}
    <tr>
        <td>{{ r[0] }}</td>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>{{ r[3] }}</td>
        <td>{{ r[4] }}</td>
        <td>{{ r[5] }}</td>

        <td>
            <a href="https://www.google.com/maps?q={{ r[3] }},{{ r[4] }}" target="_blank">
                View on Map
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endif %}</div>

</body>
</html>
